<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Profile | My Health Journey | Wise Homeopathy</title>
<meta name="description" content="View and update your Wise Homeopathy patient profile details.">
<link rel="canonical" href="https://www.wisehomeopathy.com/my-health-journey/profile/">
<link rel="icon" href="/assets/favicon.ico" sizes="any"><!-- Owner must replace with real asset: favicon.ico -->
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg"><!-- Owner must replace with real asset: favicon.svg -->
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png"><!-- Owner must replace with real asset: apple-touch-icon.png 180x180 -->
<link rel="mask-icon" href="/assets/safari-pinned-tab.svg" color="#27498C"><!-- Owner must replace with real asset: safari-pinned-tab.svg -->
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#27498C">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/site.css">
<style>
/* Page-specific layout — header duplicated from my-health-journey/symptoms/index.html
   (itself duplicated from the frozen public-site pattern), per this repo's
   existing per-page CSS convention rather than a shared file (docs/29 §14
   F2's own header comment). Form styling reuses assets/site.css's existing
   .field/.submit/.status classes unchanged — no new form-control CSS needed. */
.wrap{max-width:640px}
body{background:var(--color-surface)}

.dash-header{position:sticky;top:0;z-index:10;background:var(--color-surface-base);border-bottom:1px solid var(--color-line)}
.dash-header-inner{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;padding-top:16px;padding-bottom:16px}
.dash-brand{display:flex;align-items:center;gap:10px}
.dash-brand img{height:30px;width:auto}
.dash-brand .dash-logo-mark{display:none;height:30px;width:30px;border-radius:50%;background:var(--color-brand);color:#fff;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:600}
.dash-title{font-size:18px;color:var(--color-brand-strong);margin:0;text-align:left}
.dash-user{display:flex;align-items:center;gap:14px}
.dash-greeting{font-size:14px;color:var(--color-text-secondary)}
.dash-greeting .skeleton{display:inline-block;width:110px;vertical-align:middle;margin:0}
.dash-signout{background:transparent;border:1px solid var(--color-line);color:var(--color-brand-strong);font:600 13.5px var(--font-body);padding:9px 16px;border-radius:var(--radius-md);cursor:pointer;transition:background .15s ease,border-color .15s ease}
.dash-signout:hover{background:var(--color-surface);border-color:var(--color-brand)}

.pf-main{padding-top:clamp(20px,4vw,32px)}
.pf-page-title{font-family:var(--font-display);font-size:22px;color:var(--color-brand-strong);margin-bottom:6px;text-align:left}
.pf-back{display:inline-block;margin-bottom:20px;font-size:13.5px;color:var(--color-brand);text-decoration:none;font-weight:500}
.pf-back:hover{text-decoration:underline}
.pf-note{font-size:13.5px;color:var(--color-text-secondary);margin-bottom:18px}

@media(max-width:640px){.dash-header-inner{justify-content:center;text-align:center}.dash-user{width:100%;justify-content:space-between}}
</style>
</head>
<body>
<a class="skip" href="#main">Skip to main content</a>

<header class="dash-header">
  <div class="wrap dash-header-inner">
    <div class="dash-brand">
      <img src="../../assets/logo.svg" alt="Wise Homeopathy Multispeciality Center" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <span class="dash-logo-mark" aria-hidden="true">W</span>
      <h1 class="dash-title serif">My Health Journey</h1>
    </div>
    <div class="dash-user">
      <span class="dash-greeting" id="greeting" aria-live="polite"><span class="skeleton"></span></span>
      <button class="dash-signout" type="button" id="signOutBtn">Sign out</button>
    </div>
  </div>
</header>

<main id="main" class="wrap pf-main">
  <a class="pf-back" href="../../my-health-journey/">&larr; Back to Dashboard</a>
  <h2 class="pf-page-title serif">My Profile</h2>
  <p class="pf-note">These details help our clinic stay in touch with you. Everything here is optional.</p>

  <div id="pfContent" aria-busy="true">
    <div class="card" style="max-width:560px">
      <div class="skeleton" style="width:60%"></div>
      <div class="skeleton" style="width:85%"></div>
      <div class="skeleton" style="width:70%"></div>
    </div>
  </div>
</main>

<script src="../../my-health-journey/session-guard.js"></script>
<script src="../../my-health-journey/profile/profile.js"></script>
</body>
</html>
