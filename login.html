<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Patient Login | Wise Homeopathy</title>
<meta name="description" content="Sign in to your Wise Homeopathy patient account with a secure, passwordless login link sent to your email.">
<link rel="canonical" href="https://www.wisehomeopathy.com/login.html">
<link rel="icon" href="/assets/favicon.ico" sizes="any"><!-- Owner must replace with real asset: favicon.ico -->
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg"><!-- Owner must replace with real asset: favicon.svg -->
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png"><!-- Owner must replace with real asset: apple-touch-icon.png 180x180 -->
<link rel="mask-icon" href="/assets/safari-pinned-tab.svg" color="#27498C"><!-- Owner must replace with real asset: safari-pinned-tab.svg -->
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#27498C">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/site.css">
<style>
/* Page-specific layout only — shared tokens/components now live in
   assets/site.css (docs/29 §13 Batch 5C extraction). */
.wrap{max-width:480px;min-height:100vh;display:flex;flex-direction:column;justify-content:center}
</style>
</head>
<body>
<div class="wrap">
  <main>
    <div class="brand" aria-hidden="false">
      <img src="assets/logo.svg" alt="Wise Homeopathy Multispeciality Center" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';this.nextElementSibling.nextElementSibling.style.display='block'">
      <span class="mark" aria-hidden="true">W</span>
      <span class="txt">Wise Homeopathy</span>
    </div>

    <!-- Batch PXP-8 (docs/44 §5/§22, ADR-015): a skeleton state shown only
         for the instant it takes to check for a locally-stored trusted
         device — see this page's own script for why this never blocks or
         delays a patient with no such device (the overwhelming majority,
         until they opt in on verify.html). -->
    <div id="checkingDeviceState">
      <div class="skeleton" style="width:60%"></div>
      <div class="skeleton" style="width:40%"></div>
    </div>

    <div id="loginFormState" hidden>
    <h1 class="serif">Patient Login</h1>
    <p class="sub">Enter the email address on your patient record and we'll send you a secure sign-in link. No password needed.</p>

    <div class="card">
      <form id="loginForm" novalidate>
        <div class="field">
          <label for="email">Email address</label>
          <input id="email" name="email" type="email" required autocomplete="email" placeholder="you@example.com">
        </div>
        <button class="submit" type="submit" id="submitBtn">Send login link</button>
        <div class="status" id="statusBox" role="status" aria-live="polite"></div>
      </form>
    </div>

    <p class="foot">Not yet a patient? <a href="contact.html">Book a consultation</a> to get started, or <a href="index.html">return to the homepage</a>.</p>
    </div>
  </main>
</div>

<!-- Batch PXP-8's own disclosed, additive exception: device-trust.js is a
     new, non-frozen file (see its own header comment). -->
<script src="my-health-journey/device-trust.js"></script>
<script>
(function () {
  // Same Apps Script Web App deployment as internal/consultation-summary.html —
  // Foundation and Phase 1.5 share one project/one doPost (docs/29 §14
  // Decision 1); Code.gs's dispatch shim (IA-2) routes this page's requests
  // to FoundationRouter.gs by their foundation_action field.
  var WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwrAx9jPnji2U-ngBpYTtV2p_SJnnFrYa7fKYo589zeVfRrwuz3N5aIS0xeiQeuFvMhIQ/exec';

  var checkingDeviceState = document.getElementById('checkingDeviceState');
  var loginFormState = document.getElementById('loginFormState');
  var form = document.getElementById('loginForm');
  var submitBtn = document.getElementById('submitBtn');
  var emailField = document.getElementById('email');
  var statusBox = document.getElementById('statusBox');

  function showStatus(kind, message) {
    statusBox.className = 'status ' + kind;
    statusBox.textContent = message;
  }

  // Batch PXP-8 (docs/44 §5/§22, ADR-015): this page is every session-
  // guarded page's own redirect target on a missing/rejected session
  // (my-health-journey/dashboard.js, my-health-journey/session-guard.js),
  // so it is this batch's one, single silent-recovery point — reveals the
  // login form only after a locally-stored trusted device token (if any)
  // has been tried and failed, rather than touching every page that might
  // redirect here. A patient with no trusted device (the overwhelming
  // majority until they opt in on verify.html) sees this resolve
  // immediately, since WiseDeviceTrust.attemptTrustedDeviceLogin() returns
  // right away with no network call when no device token is stored.
  function showLoginForm() {
    checkingDeviceState.hidden = true;
    loginFormState.hidden = false;

    // A session-guarded page redirects here with ?reason=expired when a
    // previously-valid session is rejected server-side (FOUNDATION_UNAUTHORIZED
    // covers expired, tampered, and unknown tokens alike — docs/29 §3's
    // anti-enumeration-style generic rejection, applied here to session
    // validity instead of login). Shown only once silent trusted-device
    // recovery has already been tried and failed above — a successful
    // recovery redirects straight back to the dashboard and this message
    // never displays at all. The message itself is deliberately generic
    // for the same reason, not specific to which rejection occurred.
    if (new URLSearchParams(window.location.search).get('reason') === 'expired') {
      if (window.history && window.history.replaceState) {
        window.history.replaceState({}, document.title, window.location.pathname);
      }
      showStatus('warn', 'For your privacy, your secure session has ended. Please sign in again.');
    }
  }

  if (WEB_APP_URL.indexOf('REPLACE_WITH') === 0 || !window.WiseDeviceTrust) {
    showLoginForm();
  } else {
    window.WiseDeviceTrust.attemptTrustedDeviceLogin(WEB_APP_URL).then(function (sessionToken) {
      if (sessionToken) {
        window.location.href = 'my-health-journey/';
      } else {
        showLoginForm();
      }
    });
  }

  form.addEventListener('submit', function (event) {
    event.preventDefault();

    if (WEB_APP_URL.indexOf('REPLACE_WITH') === 0) {
      showStatus('err', 'This form is not yet connected to a deployed Apps Script Web App. See apps-script/README.md.');
      return;
    }

    if (!form.checkValidity()) {
      form.reportValidity();
      return;
    }

    submitBtn.disabled = true;
    showStatus('loading', 'Sending…');

    fetch(WEB_APP_URL, {
      method: 'POST',
      // text/plain avoids a CORS preflight; the Apps Script doPost still
      // parses the body as JSON regardless of Content-Type (docs/29 §3).
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        foundation_action: 'request_login_link',
        email: emailField.value
      })
    })
      .then(function (response) { return response.json(); })
      .then(function (data) {
        // Every Foundation response is a response-envelope
        // (shared/contracts/response-envelope.schema.json): branch on
        // data.status ('ok'/'error'), never on an HTTP status code —
        // Apps Script Web Apps always transport as HTTP 200 regardless.
        if (data.status === 'ok') {
          // The server's own message is already the anti-enumeration-safe
          // generic copy (docs/29 §3) — displayed verbatim, not
          // re-worded, so this page never invents wording that could
          // accidentally leak more or less than the backend intends.
          showStatus('ok', data.data.message);
          form.reset();
        } else {
          // error.message is already human-readable and non-technical
          // (FoundationContracts.gs's own contract) — safe to display
          // directly for every error.code, known or not.
          showStatus('err', (data.error && data.error.message) || 'Something went wrong. Please try again.');
        }
        submitBtn.disabled = false;
      })
      .catch(function () {
        showStatus('err', 'Could not reach the login service. Check your internet connection and try again.');
        submitBtn.disabled = false;
      });
  });
})();
</script>
</body>
</html>
